name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run no-paid-LLM check
        run: bash scripts/test_no_paid_ai.sh

      - name: Run field extraction checks
        run: bash scripts/test_field_extraction.sh

      - name: Run Notion property formatting checks
        run: bash scripts/test_notion_property_formatting.sh

      - name: Verify sample bundle files exist
        run: |
          python - <<'PY'
          from pathlib import Path

          required = [
              Path("examples/sample_bundle/transcript.txt"),
              Path("examples/sample_bundle/analysis.md"),
              Path("examples/sample_bundle/analysis.json"),
              Path("examples/sample_bundle/qa_pairs.json"),
              Path("examples/sample_bundle/field_extraction.json"),
              Path("examples/sample_bundle/chunk_metadata.json"),
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit("\n".join(missing))
          PY

  static-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Compile Python modules
        run: python -m compileall -q transcription_service
